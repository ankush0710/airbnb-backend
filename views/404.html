<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>airbnb-404 not found</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
            color: #0f172a;
        }

        .page-shell {
            text-align: center;
            max-width: 640px;
            padding: 2.5rem 1.75rem;
            border-radius: 28px;
            background: #ffffff;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        h1 {
            margin: 0;
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            color: #1d4ed8;
        }

        p {
            margin: 1rem 0 1.75rem;
            color: #475569;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        a {
            display: inline-block;
            padding: 0.95rem 1.5rem;
            border-radius: 14px;
            background: #1d4ed8;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s ease;
        }

        a:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <h1>404</h1>
        <p>Sorry, the page you are looking for cannot be found. Please check the URL or return to the homepage.</p>
